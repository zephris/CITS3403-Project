<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Web - Perth Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="home.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/7b1861c54b.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container mt-5">
        <div class="header-box text-center">
            <h1 class="display-4">Welcome to Monopoly Web - Perth Edition!</h1>
            <p class="lead mb-0">Experience the classic board game like never before, now in a web-based format with a Perth twist!</p>
        </div>
    </div>
    <div class="container mt-4">
        <div class="d-flex flex-column align-items-center gap-3">
            <a href="/browser" class="btn btn-primary btn-lg"><i class="fa-solid fa-users"></i>Multiplayer</a>
            <a href="/singleplayer" class="btn btn-secondary btn-lg"><i class="fa-solid fa-user"></i>Single Player</a>
            <a href="/profile" class="btn btn-outline-primary btn-lg"><i class="fa-solid fa-circle-user"></i>My Profile</a>
            <a href="/settings" class="btn btn-outline-secondary btn-lg"><i class="fa-solid fa-gear"></i>Settings</a>
            <a href="/credit" class="btn btn-dark btn-lg">Credit</a>
        </div>
    </div>
</body>
</html>
